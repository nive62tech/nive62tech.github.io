<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Niveditha S Nair</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="project.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="detail-body-page">

<!-- NAV -->
<nav id="nav" class="s">
  <a class="nav-logo" href="index.html"><span>&lt;</span>NSN<span>/&gt;</span></a>
  <a href="index.html#projects" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    All Projects
  </a>
</nav>

<!-- CONTENT — filled by JS -->
<main id="detail-root"></main>

<!-- FOOTER -->
<footer>
  <div class="foot-inner">
    <span class="foot-logo">&lt;NSN/&gt;</span>
    <p>Niveditha S Nair · AI/ML Engineer · Kerala, India</p>
    <div class="foot-links">
      <a href="mailto:nivtecho@gmail.com">Email</a>
      <a href="https://linkedin.com/in/niveditha-s-nair" target="_blank">LinkedIn</a>
      <a href="https://github.com/nive62tech" target="_blank">GitHub</a>
    </div>
  </div>
</footer>

<script src="projects-data.js"></script>
<script>
const id   = new URLSearchParams(window.location.search).get('id');
const data = PROJECTS[id];
const root = document.getElementById('detail-root');

if (!data) {
  document.title = 'Not Found — Niveditha S Nair';
  root.innerHTML = `
    <div class="d-not-found">
      <div class="section-tag">404</div>
      <h1>Project not found</h1>
      <p>This project doesn't exist or the link may be broken.</p>
      <a href="index.html#projects" class="btn-primary">Back to Projects</a>
    </div>`;
} else {
  document.title = data.title + ' — Niveditha S Nair';

  /* Tags */
  const tagsHtml = data.tags.map(t => `<span class="d-tag">${t}</span>`).join('');

  /* Highlights */
  const hlHtml = data.highlights.map(h => `
    <li class="d-hl-item">
      <div class="d-hl-dot"></div>
      <span>${h}</span>
    </li>`).join('');

  /* Links */
  let linksHtml = '';
  if (data.github) linksHtml += `
    <a href="${data.github}" target="_blank" class="btn-primary d-link-btn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      View on GitHub
    </a>`;
  if (data.demo)   linksHtml += `
    <a href="${data.demo}" target="_blank" class="btn-outline d-link-btn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Live Demo
    </a>`;

  /* Tech stack pills from meta */
  const stackPills = data.meta.stack.split('·').map(s =>
    `<span class="d-stack-pill">${s.trim()}</span>`).join('');

  /* Gallery images — tries images/<id>-1.jpg etc, falls back to placeholder */
  function imgOrPlaceholder(src, alt) {
    return `
      <div class="d-gal-item">
        <img src="${src}" alt="${alt}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="d-gal-placeholder" style="display:none;">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>${alt}</span>
        </div>
      </div>`;
  }

  root.innerHTML = `

    <!-- ── HERO ─────────────────────────── -->
    <section class="d-hero">
      <div class="d-hero-inner">
        <div class="d-breadcrumb">
          <a href="index.html">Home</a>
          <span>/</span>
          <a href="index.html#projects">Projects</a>
          <span>/</span>
          <span>${data.title}</span>
        </div>

        <div class="section-tag">${data.eyebrow}</div>
        <h1 class="d-title">${data.title}</h1>
        <p class="d-tagline">${data.tagline}</p>

        <div class="d-tags">${tagsHtml}</div>

        <div class="d-actions">
          ${linksHtml}
          ${!linksHtml ? '<span class="d-no-link">Source not public yet</span>' : ''}
        </div>
      </div>
    </section>

    <!-- ── MAIN IMAGE ────────────────────── -->
    <section class="d-main-image">
      <div class="d-img-wrap">
        <img
          src="images/${id}.jpg"
          alt="${data.title} — main screenshot"
          class="d-hero-img"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
        >
        <div class="d-hero-img-placeholder" style="display:none;">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Add a main screenshot — images/${id}.jpg</span>
        </div>
      </div>
    </section>

    <!-- ── BODY ─────────────────────────── -->
    <section class="d-content">
      <div class="d-content-inner">

        <!-- Left: text -->
        <div class="d-main">

          <div class="d-section">
            <h2 class="d-section-h">Overview</h2>
            <p class="d-section-p">${data.overview}</p>
          </div>

          <div class="d-section">
            <h2 class="d-section-h">Highlights</h2>
            <ul class="d-hl-list">${hlHtml}</ul>
          </div>

          <!-- Gallery -->
          <div class="d-section">
            <h2 class="d-section-h">Gallery</h2>
            <div class="d-gallery">
              ${imgOrPlaceholder(`images/${id}-1.jpg`, 'Screenshot 1')}
              ${imgOrPlaceholder(`images/${id}-2.jpg`, 'Screenshot 2')}
              ${imgOrPlaceholder(`images/${id}-3.jpg`, 'Screenshot 3')}
            </div>
            ${data.video ? `
            <div class="d-video-wrap">
              <video controls poster="images/${id}-thumb.jpg">
                <source src="videos/${id}-demo.mp4" type="video/mp4">
              </video>
            </div>` : ''}
          </div>

        </div>

        <!-- Right: metadata sidebar -->
        <aside class="d-sidebar">

          <div class="d-sidebar-card">
            <div class="d-meta-title">Project Info</div>
            <div class="d-meta-row">
              <span class="d-meta-lbl">Role</span>
              <span class="d-meta-val">${data.meta.role}</span>
            </div>
            <div class="d-meta-row">
              <span class="d-meta-lbl">Status</span>
              <span class="d-meta-val d-status">${data.meta.status}</span>
            </div>
            <div class="d-meta-row stack-row">
              <span class="d-meta-lbl">Stack</span>
              <div class="d-stack-pills">${stackPills}</div>
            </div>
          </div>

          <div class="d-sidebar-card d-links-card">
            <div class="d-meta-title">Links</div>
            ${data.github ? `
            <a href="${data.github}" target="_blank" class="d-sidebar-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
              GitHub Repository
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:auto"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>` : '<span class="d-no-link-sm">Source not public yet</span>'}
            ${data.demo ? `
            <a href="${data.demo}" target="_blank" class="d-sidebar-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              Live Demo
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:auto"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </a>` : ''}
          </div>

          <a href="index.html#projects" class="btn-outline d-back-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            All Projects
          </a>

          <a href="index.html#contact" class="btn-primary d-contact-btn">
            Let's Talk →
          </a>

        </aside>
      </div>
    </section>

  `;
}
</script>
</body>
</html>
