<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Details — Niveditha S Nair</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-accent"></div>

<div class="detail-page">
  <nav class="detail-nav">
    <a href="index.html#s2" class="back-link" onclick="sessionStorage.setItem('scrollTo','2')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Projects
    </a>
    <div class="nav-logo"><span class="lb">&lt;</span>NSN<span class="lb">/&gt;</span></div>
  </nav>

  <div id="content">
    <!-- Filled in by JS based on ?id= -->
  </div>
</div>

<footer>
  <span class="foot-logo">&lt;NSN/&gt;</span>
  <p>Niveditha S Nair · AI/ML Engineer · Kerala, India</p>
  <div class="foot-links">
    <a href="mailto:nivtecho@gmail.com">Email</a>
    <a href="https://linkedin.com/in/niveditha-s-nair" target="_blank">LinkedIn</a>
    <a href="https://github.com/nive62tech" target="_blank">GitHub</a>
  </div>
</footer>

<script src="projects-data.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const data = PROJECTS[id];
const content = document.getElementById('content');

if (!data) {
  content.innerHTML = `
    <div class="detail-hero">
      <div class="detail-eyebrow">Not Found</div>
      <h1 class="detail-title">Project not found</h1>
      <p class="detail-tagline">This project doesn't exist or the link is broken.</p>
      <a href="index.html#s2" class="btn-g" style="display:inline-flex;">Back to Projects</a>
    </div>`;
} else {
  document.title = data.title + ' — Niveditha S Nair';

  const tagsHtml = data.tags.map(t => `<span class="ptag">${t}</span>`).join('');
  const highlightsHtml = data.highlights.map(h => `
    <li>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      <span>${h}</span>
    </li>`).join('');

  let linksHtml = '';
  if (data.github) linksHtml += `<a href="${data.github}" target="_blank" class="btn-w"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg> View on GitHub</a>`;
  if (data.demo) linksHtml += `<a href="${data.demo}" target="_blank" class="btn-g">Live Demo →</a>`;
  if (!linksHtml) linksHtml = `<span style="font-size:0.85rem;color:var(--dimmed);font-family:var(--font-m);">Source not public yet</span>`;

  content.innerHTML = `
    <div class="detail-hero">
      <div class="detail-eyebrow">${data.eyebrow}</div>
      <h1 class="detail-title">${data.title}</h1>
      <p class="detail-tagline">${data.tagline}</p>
      <div class="detail-tags">${tagsHtml}</div>
      <div class="detail-links">${linksHtml}</div>
    </div>

    <div class="detail-media">
      <div class="detail-media-main">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">${data.iconPath}</svg>
      </div>
      <div class="detail-media-grid">
        <div class="detail-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>
        <div class="detail-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>
        <div class="detail-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>
      </div>
    </div>

    <div class="detail-body">
      <div class="detail-meta-grid">
        <div><div class="dmeta-label">Role</div><div class="dmeta-val">${data.meta.role}</div></div>
        <div><div class="dmeta-label">Stack</div><div class="dmeta-val">${data.meta.stack}</div></div>
        <div><div class="dmeta-label">Status</div><div class="dmeta-val">${data.meta.status}</div></div>
      </div>

      <div class="detail-section">
        <h2>Overview</h2>
        <p>${data.overview}</p>
      </div>

      <div class="detail-section">
        <h2>Highlights</h2>
        <ul class="detail-list">${highlightsHtml}</ul>
      </div>

      <div class="detail-cta">
        <a href="index.html#s2" class="btn-w">← Back to All Projects</a>
        <a href="index.html#s4" class="btn-g">Get in Touch →</a>
      </div>
    </div>`;
}
</script>
</body>
</html>
